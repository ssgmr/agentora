  <rect x="0" y="12" width="16" height="4" fill="#689F38"/>
  <!-- Small flowers -->
  <circle cx="4" cy="5" r="1.5" fill="#FFEB3B"/>
  <circle cx="12" cy="8" r="1.5" fill="#FF5722"/>
  <!-- Grass blades -->
