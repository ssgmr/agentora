# Agentora P2P 节点 A 配置（种子节点）
# 端口 4001，作为种子节点接受连接

[simulation]
# P2P 模式下此配置无效（每节点固定 1 Agent）
initial_agent_count = 1
npc_count = 1
tick_interval_secs = 5
npc_decision_interval_secs = 3
player_decision_interval_secs = 2
vision_radius = 10
trade_timeout_ticks = 50

[inventory]
max_slots = 20
max_stack_size = 20
warehouse_limit_multiplier = 2

# P2P 配置 - 启用分布式模式
[p2p]
mode = "p2p"
region_size = 32
port = 4001
# 种子节点不需要连接其他节点
seed_peer = ""
