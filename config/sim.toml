# Agentora 模拟配置（实际游戏用户只会有一个agent，且无npc。目前多agent+npc只是开发测试时用）

[simulation]
# LLM 驱动 Agent 数量（走完整决策管道，耗时较长，建议 1-5）
initial_agent_count = 1

# NPC 数量（规则引擎快速决策，不阻塞 LLM Agent）
npc_count = 2

# 世界 tick 间隔（秒），控制状态衰减和世界时间推进速度
# 默认 5 秒一个 tick，给 Agent 充足的决策时间
tick_interval_secs = 5

# NPC 决策间隔（秒）
npc_decision_interval_secs = 3

# 玩家 Agent 决策间隔（秒）
player_decision_interval_secs = 2

# Agent 视野扫描半径（格子数），决定 Agent 能看到多远的周边环境
vision_radius = 10

# 交易超时 tick 数（超过此时间自动取消交易，解冻资源）
trade_timeout_ticks = 50

# 背包系统配置
[inventory]
# 背包格子数量（不同资源类型的种类上限）
max_slots = 20
# 单个资源堆叠上限
max_stack_size = 20
# 仓库附近堆叠上限倍率
warehouse_limit_multiplier = 2

# P2P 配置（可选，启用后为分布式模式）
# 默认为中心化模式（不添加 [p2p] 配置段即为中心化）
# [p2p]
# mode = "p2p"
# local_agent_ids = []
# region_size = 32
# port = 4001
# seed_peer = ""
