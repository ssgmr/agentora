# Agentora P2P 模式配置 - 节点1（种子节点）
# 第一个启动的客户端，作为种子节点

[simulation]
initial_agent_count = 1
npc_count = 0
tick_interval_secs = 5
npc_decision_interval_secs = 3
player_decision_interval_secs = 2
vision_radius = 10
trade_timeout_ticks = 50

[inventory]
max_slots = 20
max_stack_size = 20
warehouse_limit_multiplier = 2

# P2P 配置段
[p2p]
mode = "p2p"
# 本地负责的 Agent ID
local_agent_ids = ["agent_1"]
# P2P 区域大小
region_size = 32
# P2P 监听端口
port = 4001
# 种子节点地址（空表示自己是种子）
seed_peer = ""