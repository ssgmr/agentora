# Agentora 默认世界种子配置
# 用于MVP测试和演示

# 地图大小 [width, height]
map_size = [256, 256]

# 地形分布比例（使用 inline table 避免 toml crate 解析 bug）
terrain_ratio = { plains = 0.5, forest = 0.25, mountain = 0.1, water = 0.1, desert = 0.05 }

# 资源密度 (0.0-1.0)
resource_density = 0.02

# 区域大小 (每个区域的格子数)
region_size = 16

# 初始Agent数量
initial_agents = 5

# 生成位置策略: random/clustered/scattered
spawn_strategy = "scattered"

# 随机种子（用于确定性世界生成）
# 设置为固定值确保多客户端世界一致
# 设置为 0 则每次生成不同世界
random_seed = 42

# P2P种子节点地址（留空表示单机模式）
seed_peers = []

# 压力池配置
[pressure_config]
# 压力事件触发间隔范围 (tick)
trigger_interval_range = [20, 50]
# 资源波动幅度 (0.0-1.0)
resource_fluctuation = 0.3
# 气候事件概率
climate_event_probability = 0.1
# 区域封锁持续时间范围 (tick)
blockade_duration_range = [10, 30]

# Agent性格配置（任务 4.1）
[agent_personalities]
# 性格分配方式：random / default / explorer / socializer / survivor / builder
assignment = "random"

# 默认性格（未配置或assignment=default时使用）
default = { openness = 0.5, agreeableness = 0.5, neuroticism = 0.5, description = "一个普通的世界居民" }

# 性格模板定义
[agent_personalities.templates.explorer]
openness = 0.8
agreeableness = 0.3
neuroticism = 0.4
description = "一个好奇的探索者，喜欢发现新事物，倾向于独自行动"

[agent_personalities.templates.socializer]
openness = 0.6
agreeableness = 0.8
neuroticism = 0.3
description = "一个友善的交际者，喜欢与其他Agent交流，乐于合作"

[agent_personalities.templates.survivor]
openness = 0.3
agreeableness = 0.4
neuroticism = 0.7
description = "一个谨慎的生存者，注重自身安全，会优先储备资源"

[agent_personalities.templates.builder]
openness = 0.5
agreeableness = 0.6
neuroticism = 0.3
description = "一个创造者，喜欢建造建筑和留下遗产"