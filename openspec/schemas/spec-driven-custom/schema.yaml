name: spec-driven-custom
version: 1
description: |
  自定义OpenSpec 工作流 - 需求说明（proposal） → 规格说明（specs） → 详细设计（design） → 任务列表（tasks）

  支持全栈开发场景，包含后端 API、数据模型以及前端交互、页面设计、组件设计等内容。
artifacts:
  - id: proposal
    generates: proposal.md
    description: 需求说明书，概述变更的背景、目标和范围
    template: proposal.md
    instruction: >
      创建需求说明书文档，阐明本次变更的背景、目标和范围。


      文档结构说明：

      - **背景概述**：1-2 段文字，描述当前现状、存在的问题或改进机会。

      - **变更目标**：本次变更要达成的目标，用列表形式逐条说明。

      - **功能范围**：明确本次变更涉及的功能模块：
        - **新增功能**：本次引入的新功能。每个功能将生成对应的 `specs/<功能名>/spec.md`。使用 kebab-case 命名（如 `user-auth`、`data-export`）。
        - **修改功能**：现有功能的行为变更（仅当规格层面的行为发生变化时才填写）。需要在 `openspec/specs/` 中查找已有的规格名称。若无规格变更则留空。
      - **影响范围**：涉及的代码模块、API接口、依赖组件或相关系统。

      - **验收标准**：本次变更的验收条件，明确"完成"的定义。


      重要提示：
      - 功能范围章节是核心内容，它建立了需求说明与规格说明之间的契约关系。
      - 请先研究现有规格文档，再填写此章节。
      - 保持文档简洁，但要明确所有需求输入项和依赖项，聚焦于"做什么"而非"怎么做"。
      - 实现细节将在 design.md 中描述。
      - 此文档是后续规格说明、详细设计和任务列表的基础。
    requires: []
  - id: specs
    generates: specs/**/*.md
    description: 功能规格说明，明确系统应该做什么
    template: spec.md
    instruction: >
      创建规格说明文件，定义系统应该做什么。


      为需求说明中"功能范围"章节列出的每个功能创建一个规格文件：
      - 新增功能：使用 proposal 中的 kebab-case 名称（specs/<功能名>/spec.md）
      - 修改功能：使用现有规格目录名（openspec/specs/<功能名>/），在 specs/<功能名>/spec.md 创建增量规格


      增量操作类型（使用 ## 二级标题）：

      - **ADDED Requirements**：新增功能需求

      - **MODIFIED Requirements**：修改已有行为 - 必须包含完整的更新内容

      - **REMOVED Requirements**：废弃功能 - 必须包含 **原因** 和 **迁移方案**

      - **RENAMED Requirements**：仅名称变更 - 使用 FROM:/TO: 格式


      格式要求：

      - 每个需求使用：`### Requirement: <需求名称>` 后跟需求描述

      - 使用规范性语言：SHALL/MUST（避免使用 should/may）

      - 每个场景使用：`#### Scenario: <场景名称>` 配合 WHEN/THEN 格式

      - **关键**：场景必须使用 4 个井号（`####`）。使用 3 个井号或列表格式会导致解析失败。

      - 每个需求必须至少有一个场景。


      场景编写要点：

      - 正常场景：描述正常流程的输入和预期输出
      - 异常场景：描述边界条件、错误输入的预期处理
      - 每个场景应该是可测试的


      修改需求的工作流程：

      1. 在 openspec/specs/<功能名>/spec.md 中定位现有需求

      2. 复制完整的需求块（从 `### Requirement:` 到所有场景）

      3. 粘贴到 `## MODIFIED Requirements` 下并编辑以反映新行为

      4. 确保标题文本精确匹配（忽略空白差异）


      常见错误：使用 MODIFIED 但只包含部分内容，归档时会丢失细节。

      如果只是添加新内容而不改变现有行为，请使用 ADDED。


      示例：

      ```

      ## ADDED Requirements


      ### Requirement: 用户可导出数据

      系统应允许用户以 CSV 格式导出其数据。


      #### Scenario: 成功导出

      - **WHEN** 用户点击"导出"按钮

      - **THEN** 系统下载包含所有用户数据的 CSV 文件


      #### Scenario: 无数据时导出

      - **WHEN** 用户点击"导出"按钮

      - **AND** 用户没有任何数据

      - **THEN** 系统提示"暂无数据可导出"


      ## REMOVED Requirements


      ### Requirement: 旧版导出功能

      **原因**：被新版导出系统替代

      **迁移方案**：使用新的导出接口 /api/v2/export

      ```


      规格说明应可测试 - 每个场景都是一个潜在的测试用例。


      前端需求场景补充（如有）：

      前端场景应包含以下内容：

      - **交互场景**：用户操作流程、交互反馈、状态变化
      - **UI场景**：页面跳转、弹窗交互、表单提交、列表刷新等
      - **异常场景**：网络错误、数据为空、权限不足等前端处理

      示例（前端场景）：

      ```

      #### Scenario: 用户点击导出按钮

      - **WHEN** 用户点击"导出"按钮

      - **THEN** 按钮显示 loading 状态

      - **AND** 禁用按钮防止重复点击

      - **AND** 调用导出接口


      #### Scenario: 导出成功

      - **WHEN** 导出接口返回成功

      - **THEN** 触发浏览器下载

      - **AND** 显示 toast 提示"导出成功"

      - **AND** 恢复按钮状态


      #### Scenario: 导出失败

      - **WHEN** 导出接口返回失败

      - **THEN** 显示错误 toast 提示

      - **AND** 恢复按钮状态

      ```
    requires:
      - proposal
  - id: design
    generates: design.md
    description: 详细设计文档，说明如何实现本次变更
    template: design.md
    instruction: >
      创建详细设计文档，说明如何实现本次变更。


      何时需要详细设计文档（满足以下任一条件即需要）：

      - 涉及多个服务/模块的跨切面变更，或引入新的架构模式
      - 新增外部依赖或有重大数据模型变更
      - 涉及安全、性能或迁移复杂性
      - 存在技术决策歧义，需要在编码前明确


      文档结构说明：

      - **背景与现状**：
        - 技术背景：相关的技术背景、现有架构、约束条件
        - 现状分析：当前系统的现状，存在的问题或限制
        - 关键干系人：涉及的团队、角色或外部系统

      - **设计目标**：
        - 目标：本次设计要达成的目标
        - 非目标：明确排除在本次设计范围之外的内容

      - **整体架构**：
        - 架构概览：系统架构图或模块关系图，可使用 Mermaid 或文字描述
        - 核心组件：涉及的主要组件及其职责，以表格形式呈现
        - 数据流设计：关键数据的流转过程，可使用时序图或流程图

      - **详细设计**：
        - 接口设计：新增或修改的 API 接口定义（含请求/响应结构）
        - 外部接口调用：调用的外部系统API接口（如有），包括接口地址、调用位置、请求/响应结构
        - 数据模型：新增或修改的数据表结构、字段说明（如有）
        - SQL逻辑：业务涉及的关键SQL语句（如有），包括完整的SQL和业务含义说明
        - 核心算法：关键算法或业务逻辑的伪代码/流程图/代码片段
        - 异常处理：边界情况和异常场景的处理策略
        - 前端设计：交互逻辑、页面设计、组件设计等内容（如有，详见下方前端设计说明）

      - **技术决策**：关键技术选型及理由（为什么选 X 不选 Y？），包含备选方案对比

      - **风险评估**：已知风险点及应对措施，格式：[风险] → [应对策略]

      - **迁移方案**：部署步骤、灰度策略、回滚方案（如适用）

      - **待定事项**：尚未明确的技术决策或待确认的问题


      编写要点：

      - 请参考 proposal 了解变更动机和需求说明，参考 specs 了解需求功能规格
      - SQL逻辑必须完整，包含所有过滤条件和转换逻辑
      - 核心算法提供足够的实现细节，可直接用于编码
      - 异常处理覆盖所有边界情况
      - 技术决策说明选择理由，便于后续维护和评审


      前端设计说明：

      如果变更涉及前端开发，详细设计文档的"详细设计"章节应补充前端设计内容：

      - **前端架构**
        - 技术栈：使用的框架（React/Vue/Angular）、状态管理、UI组件库等
        - 目录结构：新增/修改的目录结构说明
        - 路由设计：新增/修改的路由配置

      - **页面设计**
        - 页面列表：涉及的页面及其路径
        - 页面布局：页面结构简述或线框图描述
        - 关键页面原型：复杂页面可附带交互原型说明

      - **组件设计**
        - 组件列表：新增/修改的组件清单
        - 组件结构：每个组件的 Props、State、主要方法
        - 组件层级关系：组件树或父子关系说明
        - 示例：
          | 组件名 | 类型 | 路径 | 说明 |
          |--------|------|------|------|
          | ExportButton | 原子组件 | components/ExportButton | 导出动作按钮 |
          | ExportModal | 组合组件 | components/ExportModal | 导出配置弹窗 |

      - **交互逻辑**
        - 状态管理：涉及的 State、Store 或上下文
        - 用户操作流程：关键交互的流程图或步骤说明
        - 异常交互处理：loading 状态、错误提示、空状态展示

      - **前端接口对接**
        - API 调用：前端调用的后端接口列表
        - 数据转换：前后端数据格式映射（如有差异）

      示例（前端设计章节）：

      ```
      ### 前端设计

      #### 技术栈
      - 框架：React 18 + TypeScript
      - 状态管理：Zustand
      - UI组件库：Ant Design 5.x

      #### 页面设计
      | 页面 | 路由 | 说明 |
      |------|------|------|
      | 数据导出页 | /data/export | 数据导出配置与执行 |

      页面布局：顶部操作栏（筛选条件 + 导出按钮） + 中部数据表格 + 底部分页

      #### 组件设计
      | 组件名 | 类型 | 文件路径 | 说明 |
      |--------|------|----------|------|
      | ExportButton | 原子组件 | components/ExportButton.tsx | 导出按钮，带loading状态 |
      | ExportModal | 组合组件 | components/ExportModal.tsx | 导出配置弹窗 |
      | ExportProgress | 原子组件 | components/ExportProgress.tsx | 导出进度展示 |

      ExportButton Props:
      ```typescript
      interface ExportButtonProps {
        onExport: () => Promise<void>;
        disabled?: boolean;
        loading?: boolean;
      }
      ```

      #### 交互逻辑
      1. 用户点击导出按钮 → 按钮进入 loading 状态
      2. 调用导出接口 → 接口返回文件流
      3. 触发浏览器下载 → 显示成功 toast
      4. 异常：接口失败 → 显示错误 toast，恢复按钮状态

      #### 前端接口对接
      | 接口 | 方法 | 调用时机 | 说明 |
      |------|------|----------|------|
      | /api/v1/export | POST | 点击导出 | 触发数据导出 |
      ```
    requires:
      - proposal
      - specs
  - id: tasks
    generates: tasks.md
    description: 实施任务清单，可追踪的开发任务列表
    template: tasks.md
    instruction: >
      创建任务清单，分解实施工作。


      **重要：严格遵守以下模板格式。** apply 阶段会解析复选框格式来追踪进度。
      未使用 `- [ ]` 格式的任务将无法被追踪。


      编写指南：

      - 将相关任务归类到 ## 编号标题下

      - 每个任务必须是复选框格式：`- [ ] X.Y 任务描述`

      - 任务粒度适中，每个任务应能在一个工作会话内完成

      - 按依赖关系排序（先做哪些？后做哪些？）

      - 可补充任务依赖关系图和实施顺序表


      任务描述要点：

      - 包含具体的文件路径
      - 说明要实现的功能点或修改点
      - 标注任务依赖关系（如有）


      示例：

      ```

      ## 1. 环境准备


      - [ ] 1.1 创建新模块目录结构
        - 目录: `src/modules/user-export/`

      - [ ] 1.2 添加依赖到 package.json
        - 依赖: csv-writer, file-saver


      ## 2. 后端实现


      - [ ] 2.1 实现数据导出服务
        - 文件: `src/services/export.service.ts`
        - 实现数据查询和CSV格式化逻辑
        - 依赖: 1.1, 1.2

      - [ ] 2.2 添加导出API接口
        - 文件: `src/controllers/export.controller.ts`
        - 接口: POST /api/v1/export


      ## 3. 前端实现


      - [ ] 3.1 创建 ExportButton 组件
        - 文件: `src/components/ExportButton/index.tsx`
        - 实现导出按钮，支持 loading 状态和防重复点击

      - [ ] 3.2 创建 ExportModal 组件
        - 文件: `src/components/ExportModal/index.tsx`
        - 实现导出配置弹窗，支持格式选择、字段筛选
        - 依赖: 3.1

      - [ ] 3.3 集成到数据管理页面
        - 文件: `src/pages/DataManagement/index.tsx`
        - 添加导出按钮，对接导出流程
        - 依赖: 3.1, 3.2, 2.2


      ## 4. 测试与验证


      - [ ] 4.1 单元测试 - 导出服务
      - [ ] 4.2 单元测试 - ExportButton 组件
      - [ ] 4.3 集成测试 - 导出接口
      - [ ] 4.4 验收测试 - 端到端导出流程


      ## 任务依赖关系


      1.x (环境准备) → 2.x (后端) / 3.x (前端) → 4.x (测试)
      前端任务 3.3 依赖后端接口 2.2

      ```


      请参考 specs 了解要构建什么，参考 design 了解如何构建。
      每个任务应该是可验证的 - 你能判断它何时完成。
    requires:
      - specs
      - design
apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    阅读上下文文件，逐个完成待办任务，完成后标记为已完成。
    遇到阻塞或需要澄清时暂停。